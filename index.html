<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atmosphere — Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
    rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page-shell">
    <img src="https://cdn-icons-png.flaticon.com/512/1555/1555512.png " alt="" style="width: 80px">

    <!-- Masthead -->
    <div class="masthead">
      <p class="masthead-eyebrow">Real-Time Conditions</p>
      <h1 class="masthead-title">Atmo<span>s</span>phere</h1>
    </div>
    <!-- Search -->
    <div class="search-card">
      <label class="search-label" for="cityInput">Enter a city</label>
      <div class="search-row">
        <input type="text" id="cityInput" class="search-input" placeholder="e.g. Lagos, Paris, Tokyo…"
          autocomplete="off" spellcheck="false" />
        <button class="search-btn" id="searchBtn">
          Search
        </button>
      </div>
      <div class="error-pill" id="errorPill"></div>
    </div>



    <!-- Weather Result Card -->
    <div class="weather-card" id="weatherCard">
      <div class="card-stripe"></div>
      <div class="card-body-inner">

        <div class="location-row">
          <div class="city-name" id="cityName"></div>
          <div class="country-badge" id="countryBadge"></div>
        </div>
        <div class="weather-desc" id="weatherDesc">clear sky</div>

        <div class="temp-focal">
          <div class="temp-value" id="tempValue"></div>
          <div class="temp-unit">°C</div>
          <div class="weather-icon" id="weatherIcon">🌤️</div>
        </div>

        <div class="card-divider"></div>
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-icon">💧</div>
            <div class="stat-value" id="humidityVal"></div>
            <div class="stat-label">Humidity</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">🌬️</div>
            <div class="stat-value" id="windVal"></div>
            <div class="stat-label">Wind km/h</div>
          </div>
          <div class="stat-item">
            <div class="stat-icon">🌡️</div>
            <div class="stat-value" id="feelsVal"></div>
            <div class="stat-label">Feels Like</div>
          </div>
        </div>

      </div>
    </div>

    <p class="footer-sig">
      Powered by <a href="https://openweathermap.org" target="_blank" rel="noopener">OpenWeatherMap</a>
    </p>

  </div>
  </div>
</body>
<script type="module" src="script.js"></script>

</html>
